<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta property="og:title" content="NFL-briefen — Din ultimata NFL-dashboard">
    <meta property="og:description" content="Matchtider i svensk tid, live-tabeller och knivskarpa insider-rykten. Allt för nörden!">
    <meta property="og:image" content="https://timsor68.github.io/NFL-briefen/NFL-briefen%20logo_2.png">
    <meta property="og:url" content="https://timsor68.github.io/NFL-briefen/">
    <meta property="og:type" content="website">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    
    <title>NFL-briefen — Den ultimata NFL-dashboarden</title>
    <style>
        :root {
            --bg-color: #f1f5f9; --card-bg: #ffffff; --text-main: #0f172a; --text-muted: #64748b;
            --border-color: #e2e8f0; --nfl-blue: #013369; --nfl-red: #d50a0a; --ncaa-green: #006341;
            --fantasy-gold: #eab308; --playoff-green: #10b981; --box-bg-pastel: #f8fafc;
            --pill-all-bg: #e2e8f0; --active-pastel-blue: #e0f2fe; --active-pastel-border: #38bdf8;
            --afc-pastel-header: #fee2e2; --nfc-pastel-header: #e0f2fe; --ncaa-pastel-header: #d1fae5;
        }
        body.tab-nfl { background-color: #f1f5f9; }
        body.tab-insider { background-color: #fefcf0; }
        body.tab-ncaa { background-color: #f0fdf4; }

        body { font-family: sans-serif; color: var(--text-main); margin: 0; padding: 0; line-height: 1.5; transition: background-color 0.3s ease; }
        header { background-color: var(--card-bg); border-bottom: 1px solid var(--border-color); padding: 1rem; position: sticky; top: 0; z-index: 100; }
        .header-container { max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        main { max-width: 1000px; margin: 1.5rem auto; padding: 0 1rem; }
        .main-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        .tab-btn { flex: 1; padding: 0.8rem; font-weight: 800; border: 2px solid var(--border-color); background: var(--card-bg); cursor: pointer; border-radius: 12px; }
        .tab-btn.active[data-tab="nfl"] { background-color: var(--nfl-blue); color: white; }
        .tab-btn.active[data-tab="insider"] { background-color: var(--fantasy-gold); }
        .tab-btn.active[data-tab="ncaa"] { background-color: var(--ncaa-green); color: white; }
        
        .filter-section { background: var(--card-bg); border: 1px solid var(--border-color); padding: 1.5rem; border-radius: 16px; margin-bottom: 1.5rem; }
        .pill-all { background: var(--pill-all-bg); border: none; padding: 0.5rem 1rem; border-radius: 20px; cursor: pointer; }
        .pill-all.active { background: var(--active-pastel-blue); border: 1px solid var(--active-pastel-border); }
        
        .news-wrapper-box { background: var(--card-bg); border: 1px solid var(--border-color); padding: 1.5rem; border-radius: 16px; margin-bottom: 2rem; min-height: 200px; }
        article { background: var(--box-bg-pastel); border: 1px solid var(--border-color); padding: 1rem; border-radius: 12px; margin-bottom: 1rem; display: flex; gap: 1rem; }
        .standings-accordion { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; }
        .standings-header { background: #0f172a; color: white; padding: 1rem; cursor: pointer; }
        .standings-content { display: none; padding: 1rem; }
        .standings-content.active { display: block; }
    </style>
</head>
<body class="tab-nfl">

    <header>
        <div class="header-container">
            <div class="header-left"><h1>NFL-briefen</h1></div>
            <div class="countdown-box"><span id="countdown">Laddar...</span></div>
        </div>
    </header>

    <main>
        <div class="main-tabs">
            <button class="tab-btn active" data-tab="nfl" onclick="switchMainTab('nfl')">Pro (NFL)</button>
            <button class="tab-btn" data-tab="insider" onclick="switchMainTab('insider')">💣 Insiders</button>
            <button class="tab-btn" data-tab="ncaa" onclick="switchMainTab('ncaa')">College (NCAA)</button>
        </div>

        <div id="filter-wrapper" class="filter-section">
            <button class="pill-all active" id="btn-all-news" onclick="clearActiveFilters()">Alla nyheter</button>
            <button class="pill-fantasy" onclick="toggleFantasyFilter(this)">⭐ Fantasy</button>
        </div>

        <div class="news-wrapper-box">
            <div id="news-section-title" class="news-section-title">📰 Nyhetsflöde</div>
            <div id="status">Hämtar nyheter...</div>
            <div id="news" class="news-container"></div>
        </div>

        <div class="standings-accordion">
            <div class="standings-header" onclick="document.getElementById('standings-content').classList.toggle('active')">📊 Live Standings</div>
            <div id="standings-content" class="standings-content"><div id="standings-tables-container"></div></div>
        </div>
    </main>

    <script>
        const feeds = {
            nfl: [{name: 'ESPN', url: 'https://api.rss2json.com/v1/api.json?rss_url=https://www.espn.com/espn/rss/nfl/news'}],
            insider: [{name: 'PFT', url: 'https://api.rss2json.com/v1/api.json?rss_url=https://profootballtalk.nbcsports.com/feed/'}],
            ncaa: [{name: 'ESPN NCAA', url: 'https://api.rss2json.com/v1/api.json?rss_url=https://www.espn.com/espn/rss/ncf/news'}]
        };

        let currentTab = 'nfl';

        async function fetchAllNews() {
            const newsContainer = document.getElementById('news');
            const status = document.getElementById('status');
            newsContainer.innerHTML = '';
            status.style.display = 'block';

            let activeFeeds = feeds[currentTab];
            let allItems = [];

            for (let feed of activeFeeds) {
                try {
                    let res = await fetch(feed.url);
                    let data = await res.json();
                    if (data.items) allItems.push(...data.items);
                } catch(e) { console.error(e); }
            }

            status.style.display = 'none';
            allItems.forEach(item => {
                let article = document.createElement('article');
                article.innerHTML = `<div><h2><a href="${item.link}">${item.title}</a></h2><p>${item.description.substring(0, 100)}...</p></div>`;
                newsContainer.appendChild(article);
            });
        }

        function switchMainTab(tab) {
            currentTab = tab;
            document.body.className = `tab-${tab}`;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            fetchAllNews();
        }

        function clearActiveFilters() { fetchAllNews(); }
        function toggleFantasyFilter() { alert("Fantasy-filter aktiverat"); }

        fetchAllNews();
    </script>
</body>
</html>
