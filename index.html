<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL-briefen — Amerikansk fotboll i korthet</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --accent-color: #013369; /* NFL Blue */
            --accent-red: #d50a0a;   /* NFL Red */
            --border-color: #e2e8f0;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --card-bg: #1e293b;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --border-color: #334155;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.5;
        }

        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 1.5rem 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            font-size: 2.5rem;
        }

        h1 {
            margin: 0;
            font-size: 1.75rem;
            font-weight: 800;
        }

        .subtitle {
            margin: 0;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        main {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* --- Smart division- och pillerlayout --- */
        .filter-section {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 2rem;
        }

        .conference-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin: 0.5rem 0;
            padding-bottom: 0.25rem;
            border-bottom: 2px solid var(--border-color);
        }
        .afc-title { color: var(--accent-red); }
        .nfc-title { color: var(--accent-color); }

        .division-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .division-box h4 {
            margin: 0 0 0.5rem 0;
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        .pill-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .pill {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.35rem 0.7rem;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.1s ease;
        }

        .pill:hover {
            border-color: var(--text-muted);
        }

        .pill.active {
            background-color: var(--accent-color);
            color: #ffffff;
            border-color: var(--accent-color);
        }

        .pill-all {
            width: 100%;
            max-width: 150px;
            margin-bottom: 1rem;
            text-align: center;
            justify-content: center;
            font-weight: bold;
            background-color: var(--border-color);
        }

        /* --- Nyhetsflöde --- */
        .status {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .news-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        article {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.25rem;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        article.hidden {
            display: none;
        }

        .meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            display: flex;
            gap: 1rem;
        }

        h2 {
            margin: 0 0 0.5rem 0;
            font-size: 1.25rem;
        }

        h2 a {
            color: var(--text-main);
            text-decoration: none;
        }

        h2 a:hover {
            color: var(--accent-color);
            text-decoration: underline;
        }

        p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        footer {
            max-width: 900px;
            margin: 4rem auto 2rem auto;
            padding: 1.5rem 1rem 0 1rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo">🏈</div>
            <div>
                <h1>NFL-briefen</h1>
                <p class="subtitle">American football news — fast and concise</p>
            </div>
        </div>
    </header>

    <main>
        <!-- Filtreringssektion för alla 32 lag -->
        <div class="filter-section">
            <button class="pill pill-all active" onclick="filterLeague('ALL', this)">Layout: Alla nyheter</button>
            
            <!-- AFC -->
            <div class="conference-title afc-title">AFC</div>
            <div class="division-grid">
                <div class="division-box">
                    <h4>East</h4>
                    <div class="pill-container">
                        <button class="pill" onclick="filterLeague('Bills', this)">Bills</button>
                        <button class="pill" onclick="filterLeague('Dolphins', this)">Dolphins</button>
                        <button class="pill" onclick="filterLeague('Patriots', this)">Patriots</button>
                        <button class="pill" onclick="filterLeague('Jets', this)">Jets</button>
                    </div>
                </div>
                <div class="division-box">
                    <h4>North</h4>
                    <div class="pill-container">
                        <button class="pill" onclick="filterLeague('Ravens', this)">Ravens</button>
                        <button class="pill" onclick="filterLeague('Bengals', this)">Bengals</button>
                        <button class="pill" onclick="filterLeague('Browns', this)">Browns</button>
                        <button class="pill" onclick="filterLeague('Steelers', this)">Steelers</button>
                    </div>
                </div>
                <div class="division-box">
                    <h4>South</h4>
                    <div class="pill-container">
                        <button class="pill" onclick="filterLeague('Texans', this)">Texans</button>
                        <button class="pill" onclick="filterLeague('Colts', this)">Colts</button>
                        <button class="pill" onclick="filterLeague('Jaguars', this)">Jaguars</button>
                        <button class="pill" onclick="filterLeague('Titans', this)">Titans</button>
                    </div>
                </div>
                <div class="division-box">
                    <h4>West</h4>
                    <div class="pill-container">
                        <button class="pill" onclick="filterLeague('Broncos', this)">Broncos</button>
                        <button class="pill" onclick="filterLeague('Chiefs', this)">Chiefs</button>
                        <button class="pill" onclick="filterLeague('Raiders', this)">Raiders</button>
                        <button class="pill" onclick="filterLeague('Chargers', this)">Chargers</button>
                    </div>
                </div>
            </div>

            <!-- NFC -->
            <div class="conference-title nfc-title">NFC</div>
            <div class="division-grid">
                <div class="division-box">
                    <h4>East</h4>
                    <div class="pill-container">
                        <button class="pill" onclick="filterLeague('Cowboys', this)">Cowboys</button>
                        <button class="pill" onclick="filterLeague('Giants', this)">Giants</button>
                        <button class="pill" onclick="filterLeague('Eagles', this)">Eagles</button>
                        <button class="pill" onclick="filterLeague('Commanders', this)">Commanders</button>
                    </div>
                </div>
                <div class="division-box">
                    <h4>North</h4>
                    <div class="pill-container">
                        <button class="pill" onclick="filterLeague('Bears', this)">Bears</button>
                        <button class="pill" onclick="filterLeague('Lions', this)">Lions</button>
                        <button class="pill" onclick="filterLeague('Packers', this)">Packers</button>
                        <button class="pill" onclick="filterLeague('Vikings', this)">Vikings</button>
                    </div>
                </div>
                <div class="division-box">
                    <h4>South</h4>
                    <div class="pill-container">
                        <button class="pill" onclick="filterLeague('Falcons', this)">Falcons</button>
                        <button class="pill" onclick="filterLeague('Panthers', this)">Panthers</button>
                        <button class="pill" onclick="filterLeague('Saints', this)">Saints</button>
                        <button class="pill" onclick="filterLeague('Buccaneers', this)">Buccaneers</button>
                    </div>
                </div>
                <div class="division-box">
                    <h4>West</h4>
                    <div class="pill-container">
                        <button class="pill" onclick="filterLeague('Cardinals', this)">Cardinals</button>
                        <button class="pill" onclick="filterLeague('Rams', this)">Rams</button>
                        <button class="pill" onclick="filterLeague('49ers', this)">49ers</button>
                        <button class="pill" onclick="filterLeague('Seahawks', this)">Seahawks</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="status" class="status">Hämtar de senaste NFL-nyheterna...</div>
        <div id="news" class="news-container"></div>
    </main>

    <footer>
        NFL-briefen • Snabba amerikanska fotbollsnyheter sorterade live.
    </footer>

    <script>
        // Nyhetskällor (ESPN och NBC Sports ProFootballTalk)
        const feeds = [
            { name: 'ESPN NFL', url: 'https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.espn.com%2Fespn%2Frss%2Fnfl%2Fnews' },
            { name: 'ProFootballTalk', url: 'https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fprofootballtalk.nbcsports.com%2Ffeed%2F' }
        ];

        let loadedArticles = [];

        async function fetchNews() {
            const newsContainer = document.getElementById('news');
            const statusContainer = document.getElementById('status');

            try {
                for (const feed of feeds) {
                    const response = await fetch(feed.url);
                    const data = await response.json();
                    
                    if (data.status === 'ok') {
                        data.items.forEach(item => {
                            loadedArticles.push({
                                title: item.title,
                                link: item.link,
                                description: item.description ? item.description.replace(/<[^>]*>/g, '').substring(0, 180) + '...' : '',
                                pubDate: new Date(item.pubDate),
                                source: feed.name
                            });
                        });
                    }
                }

                // Sortera nyaste först
                loadedArticles.sort((a, b) => b.pubDate - a.pubDate);

                statusContainer.style.display = 'none';
                renderArticles(loadedArticles);

            } catch (error) {
                console.error(error);
                statusContainer.innerText = 'Ett fel uppstod när nyheterna skulle hämtas.';
            }
        }

        function renderArticles(articles) {
            const newsContainer = document.getElementById('news');
            newsContainer.innerHTML = '';

            if (articles.length === 0) {
                newsContainer.innerHTML = '<div class="status">Inga nyheter matchar ditt val för tillfället.</div>';
                return;
            }

            articles.forEach(article => {
                const timeString = article.pubDate.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });
                const dateString = article.pubDate.toLocaleDateString('sv-SE', { day: 'numeric', month: 'short' });
                
                const html = `
                    <article data-title="${article.title.toLowerCase()}" data-desc="${article.description.toLowerCase()}">
                        <div class="meta">
                            <span>${article.source}</span>
                            <span>${dateString} ${timeString}</span>
                        </div>
                        <h2><a href="${article.link}" target="_blank" rel="noopener noreferrer">${article.title}</a></h2>
                        <p>${article.description}</p>
                    </article>
                `;
                newsContainer.innerHTML += html;
            });
        }

        // Filterfunktion som kollar om lagets namn finns i rubrik eller beskrivning
        function filterLeague(teamName, buttonElement) {
            // Uppdatera aktiv klass på knapparna
            document.querySelectorAll('.pill').forEach(pill => pill.classList.remove('active'));
            buttonElement.classList.add('active');

            const articles = document.querySelectorAll('#news article');
            const statusContainer = document.getElementById('status');
            let foundAny = false;

            if (teamName === 'ALL') {
                articles.forEach(article => article.classList.remove('hidden'));
                return;
            }

            const searchKey = teamName.toLowerCase();

            articles.forEach(article => {
                const title = article.getAttribute('data-title');
                const desc = article.getAttribute('data-desc');

                if (title.includes(searchKey) || desc.includes(searchKey)) {
                    article.classList.remove('hidden');
                    foundAny = true;
                } else {
                    article.classList.add('hidden');
                }
            });
        }

        fetchNews();
    </script>
</body>
</html>
