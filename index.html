<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Matchtider, live-tabeller och knivskarpa insider-rykten. Allt för nörden!">
    <title>NFL-briefen — Den ultimata NFL-dashboarden</title>

    <!-- Social Media Preview -->
    <meta property="og:title" content="NFL-briefen — Den ultimata NFL-dashboarden">
    <meta property="og:description" content="Matchtider, live-tabeller och knivskarpa insider-rykten. Allt för nörden!">
    <meta property="og:image" content="https://timsor68.github.io/NFL-briefen/NFL-briefen%20logo_2.png">
    <meta property="og:url" content="https://timsor68.github.io/NFL-briefen/">
    <meta property="og:type" content="website">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <style>
        :root { --bg-color: #f1f5f9; --card-bg: #ffffff; --text-main: #0f172a; --fantasy-gold: #eab308; }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        .news-wrapper-box { background: var(--card-bg); padding: 1.5rem; border-radius: 16px; max-width: 800px; margin: auto; }
        article { border-bottom: 1px solid #eee; padding: 10px 0; }
        .refresh-btn { cursor: pointer; padding: 10px; background: var(--fantasy-gold); border: none; border-radius: 8px; }
    </style>
</head>
<body class="tab-nfl">
    <main>
        <div class="news-wrapper-box">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h1>📰 Nyheter</h1>
                <button class="refresh-btn" onclick="fetchAllNews()">🔄 Uppdatera</button>
            </div>
            <div id="status">Hämtar nyheter...</div>
            <div id="news"></div>
        </div>
    </main>
    <script>
        async function fetchAllNews() {
            const newsContainer = document.getElementById('news');
            const status = document.getElementById('status');
            newsContainer.innerHTML = '';
            status.style.display = 'block';
            status.innerText = 'Hämtar nyheter...';

            const rssUrl = 'https://www.espn.com/espn/rss/nfl/news';
            const apiUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(rssUrl);

            try {
                let res = await fetch(apiUrl);
                if (!res.ok) throw new Error("Network response was not ok");

                let data = await res.json();

                // 1. Kontrollera data.contents
                if (!data || !data.contents) throw new Error("No content received");

                let parser = new DOMParser();
                let xml = parser.parseFromString(data.contents, "text/xml");

                // 2. Upptäck trasig/felparsad XML (parseFromString kastar inget fel själv)
                if (xml.querySelector('parsererror')) throw new Error("Could not parse feed");

                let items = xml.querySelectorAll("item");
                if (items.length === 0) throw new Error("No items found in feed");

                status.style.display = 'none';

                items.forEach(item => {
                    // 3. Säker null-koll för varje item
                    const titleEl = item.querySelector("title");
                    const linkEl = item.querySelector("link");

                    if (!titleEl || !linkEl) return;

                    // 4. XSS-säkert skapande av element
                    let article = document.createElement('article');
                    let h2 = document.createElement('h2');
                    let a = document.createElement('a');

                    a.textContent = titleEl.textContent;
                    a.href = linkEl.textContent;
                    a.target = "_blank";
                    a.rel = "noopener noreferrer"; // 5. Förhindrar reverse tabnabbing

                    h2.appendChild(a);
                    article.appendChild(h2);
                    newsContainer.appendChild(article);
                });
            } catch(e) {
                // 6. Säkerställ att felmeddelandet faktiskt syns
                status.style.display = 'block';
                status.innerText = "Kunde inte hämta nyheter. Försök igen.";
                console.error(e);
            }
        }

        // Automatisk uppdatering var 45:e minut
        setInterval(fetchAllNews, 2700000);
        fetchAllNews();
    </script>
</body>
</html>
